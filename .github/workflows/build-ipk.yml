name: Build IPK Package

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ipk:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - ramips/mt7621   # 新增你需要的架构
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=$(echo "${{ github.ref }}" | sed 's|refs/tags/v||')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Build IPK packages
        run: |
          cd openwrt
          chmod +x build-ipk.sh
          TARGET="${{ matrix.target }}" VERSION="${{ steps.get_version.outputs.version }}" ./build-ipk.sh

      - name: Upload IPK artifacts
        uses: actions/upload-artifact@v6
        with:
          name: luci-app-wolp-ipk-${{ matrix.target }}
          path: release/*.ipk
          if-no-files-found: error
          retention-days: 30

      # 下面的 Release 步骤只在 tag 时创建，保持原样即可
      - name: Create Release (on tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.ipk
          overwrite_files: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
