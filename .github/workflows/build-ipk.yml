name: Build IPK Package

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:


jobs:
  build-ipk:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - ramips/mt7621
          # 以后如果还想加其他架构，直接在这里加，比如 x86_64
          # - x86_64
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=$(echo "${{ github.ref }}" | sed 's|refs/tags/v||')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Build IPK packages
        run: |
          cd openwrt
          chmod +x build-ipk.sh
          TARGET="${{ matrix.target }}" VERSION="${{ steps.get_version.outputs.version }}" ./build-ipk.sh

      - name: Prepare artifact name
        id: prepare
        run: |
          SAFE_NAME="luci-app-wolp-ipk-$(echo '${{ matrix.target }}' | tr '/' '-')"
          echo "safe_name=$SAFE_NAME" >> $GITHUB_OUTPUT

      - name: Upload IPK artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.prepare.outputs.safe_name }}
          path: release/*.ipk
          if-no-files-found: error
          retention-days: 30
